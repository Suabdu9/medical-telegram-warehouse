version: 2

models:

  - name: dim_channels
    description: "Channel dimension."

    columns:

      - name: channel_key
        tests:
          - unique
          - not_null

      - name: channel_name
        tests:
          - unique
          - not_null

  - name: dim_dates
    description: "Date dimension."

    columns:

      - name: date_key
        tests:
          - unique
          - not_null

      - name: full_date
        tests:
          - unique
          - not_null

  - name: fct_messages
    description: "Fact table containing Telegram messages."

    columns:

      - name: message_id
        tests:
          - unique
          - not_null

      - name: channel_key
        tests:
          - relationships:
              to: ref('dim_channels')
              field: channel_key

      - name: date_key
        tests:
          - relationships:
              to: ref('dim_dates')
              field: date_key
